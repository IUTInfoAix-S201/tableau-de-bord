# Construit le tableau de bord SAE 2.01 et le publie sur GitHub Pages.
# Collecte les metriques des depots d'equipe (org IUTInfoAix-S201-2026) via gh,
# ecrit site/data.json, historise les instantanes, puis deploie site/ sur Pages.
name: Build dashboard

on:
  schedule:
    - cron: "0 * * * *"   # toutes les heures (l'historique reste deduplique a 1 instantane/jour)
  workflow_dispatch: {}    # bouton « Run workflow » pour rafraichir a la demande

# Un seul deploiement Pages a la fois.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write   # commit de history/history.jsonl (tendances durables)
  pages: write      # deploiement Pages
  id-token: write   # OIDC pour deploy-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collecte des metriques
        env:
          # PAT fine-grained avec lecture sur l'org IUTInfoAix-S201-2026
          # (Contents, Issues, Pull requests, Actions, Metadata, Members).
          GH_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          # Equipes de reference optionnelles (JSON via secret) ; vide => ignore.
          REFERENCE_TEAMS: ${{ secrets.REFERENCE_TEAMS }}
        run: python3 tools/collecte.py

      - name: Historiser (commit de l'instantane du jour)
        # Ce repo est exclu du ruleset de branche de l'org : le bot peut pousser sur main.
        run: |
          git config user.name "dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --staged --quiet; then
            echo "Rien de nouveau a committer (historique + cache PR a jour)."
          else
            git commit -m "chore: instantane + cache tests par PR"
            git push
          fi

      - name: Prepare l'artefact Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploie sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
