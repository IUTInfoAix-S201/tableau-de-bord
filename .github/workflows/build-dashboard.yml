# Construit le tableau de bord SAE 2.01 et le publie sur GitHub Pages.
# Collecte les metriques des depots d'equipe (org IUTInfoAix-S201-2026) via gh,
# ecrit site/data.json, historise les instantanes, puis deploie site/ sur Pages.
name: Build dashboard

on:
  schedule:
    - cron: "0 5 * * *"   # tous les jours ~07h (Paris) ; ajustez si besoin
  workflow_dispatch: {}    # bouton « Run workflow » pour rafraichir a la demande

# Un seul deploiement Pages a la fois.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read    # lecture du repo (l'historique est persiste via le cache Actions)
  pages: write      # deploiement Pages
  id-token: write   # OIDC pour deploy-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Persistance des tendances via le cache Actions (pas de push git :
      # evite le ruleset d'org qui exige PR + revue sur la branche par defaut).
      - name: Restaurer l'historique
        uses: actions/cache/restore@v4
        with:
          path: history/history.jsonl
          key: history-${{ github.run_id }}
          restore-keys: |
            history-

      - name: Collecte des metriques
        env:
          # PAT fine-grained avec lecture sur l'org IUTInfoAix-S201-2026
          # (Contents, Issues, Pull requests, Actions, Metadata, Members).
          GH_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: python3 tools/collecte.py

      - name: Sauver l'historique
        if: always()
        uses: actions/cache/save@v4
        with:
          path: history/history.jsonl
          key: history-${{ github.run_id }}

      - name: Prepare l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploie sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
