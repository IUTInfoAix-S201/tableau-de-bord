# Construit le tableau de bord SAE 2.01 et le publie sur GitHub Pages.
# Collecte les metriques des depots d'equipe (org IUTInfoAix-S201-2026) via gh,
# ecrit site/data.json, historise les instantanes, puis deploie site/ sur Pages.
name: Build dashboard

on:
  schedule:
    - cron: "37 * * * *"  # toutes les heures, minute 37 (hors pic GitHub a :00 ou les runs schedule sont souvent retardes/abandonnes ; l'historique reste deduplique a 1 instantane/jour)
  workflow_dispatch: {}    # bouton « Run workflow » pour rafraichir a la demande
  workflow_run:            # chaine de bout en bout : apres la generation du bouquet,
    workflows: ["Bouquet final (Gource)"]   # rebuild immediat pour servir la nouvelle video
    types: [completed]

# Un seul deploiement Pages a la fois.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write   # commit de history/history.jsonl (tendances durables)
  pages: write      # deploiement Pages
  id-token: write   # OIDC pour deploy-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collecte des metriques
        env:
          # PAT fine-grained avec lecture sur l'org IUTInfoAix-S201-2026
          # (Contents, Issues, Pull requests, Actions, Metadata, Members).
          GH_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          # Equipes de reference optionnelles (JSON via secret) ; vide => ignore.
          REFERENCE_TEAMS: ${{ secrets.REFERENCE_TEAMS }}
        run: python3 tools/collecte.py

      - name: Historiser (commit de l'instantane du jour)
        # Ce repo est exclu du ruleset de branche de l'org : le bot peut pousser sur main.
        run: |
          git config user.name "dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --staged --quiet; then
            echo "Rien de nouveau a committer (historique + cache PR a jour)."
            exit 0
          fi
          git commit -m "chore: instantane + cache tests par PR"
          # Push robuste face aux runs concurrents (cron + build manuel lances ensemble,
          # ou tout autre push sur main) : un git push simple est rejete en non
          # fast-forward. ATTENTION : le commit touche history/ = history.jsonl (append +
          # dedup 1 instantane/jour) MAIS AUSSI les caches pr-tests.json / last-tests.json,
          # REECRITS EN ENTIER a chaque run -> un rebase nu peut conflituer dessus (c'est
          # ce qui faisait echouer le dernier des deux builds a terminer). On rebase donc
          # en gardant NOTRE version fraiche de ces fichiers (-X theirs : cote rebase,
          # "theirs" = nos commits rejoues ; ces caches sont de toute facon regeneres au
          # run suivant), puis on reessaie. La garde `|| git rebase --abort` evite de
          # rester bloque dans un rebase a moitie applique sur un conflit non resolvable.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pousse."
              exit 0
            fi
            echo "Push rejete (main a bouge), rebase + nouvelle tentative ($i/5)..."
            git pull --rebase --autostash -X theirs origin main || git rebase --abort || true
          done
          echo "::error::Echec du push apres 5 tentatives (course persistante sur main)."
          exit 1

      - name: Recupere la video du bouquet (si publiee) pour la servir via Pages
        # La video est stockee en asset de release (pas de gonflement git) mais
        # Pages la sert en video/mp4 inline (lecteur <video>), contrairement a
        # l'asset brut (octet-stream + nosniff). Ignore si la release n'existe pas encore.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download bouquet --repo "$GITHUB_REPOSITORY" \
            --pattern bouquet-final.mp4 --dir site --clobber \
            || echo "Pas encore de bouquet a servir."

      - name: Prepare l'artefact Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploie sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
